spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/esport_db
    username: postgres
    password: rin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  port: 8080
  address: 0.0.0.0
  ssl:
    key-store: keystore.p12
    key-store-password: rin888
    key-store-type: PKCS12
    key-alias: tomcat

app:
  upload:
    path: uploads
    max-file-size: 5MB

faceit:
  api:
    key: 90445245-c0f5-4367-a39b-eb4ce434ff6e
    url: https://open.faceit.com/data/v4
    rate-limit:
      requests-per-minute: 60
      cache-minutes: 60